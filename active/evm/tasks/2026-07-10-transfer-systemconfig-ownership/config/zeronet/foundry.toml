[profile.default]
src = 'src'
out = 'out'
libs = ['lib']
broadcast = 'records'
fs_permissions = [{ access = "read-write", path = "./" }]
optimizer = true
optimizer_runs = 999999
solc_version = "0.8.15"
via-ir = false
evm_version = "shanghai"
remappings = [
    '@base-contracts/=lib/contracts/',
    '@lib-keccak/=lib/lib-keccak/contracts/lib/',
    '@solady/=lib/solady/src/',
    'forge-std/=lib/forge-std/src/',
]

[lint]
lint_on_build = false
