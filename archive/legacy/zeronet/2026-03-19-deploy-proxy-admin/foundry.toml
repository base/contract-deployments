[profile.default]
src = '.'
out = 'out'
libs = ['lib']
broadcast = 'records'
fs_permissions = [{ access = "read-write", path = "./" }]
optimizer = true
optimizer_runs = 200
solc_version = "0.8.24"
via-ir = false
remappings = [
    'forge-std/=lib/forge-std/src/',
    '@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/',
    'safe-smart-account/=lib/safe-smart-account/',
]
skip = [
    "lib/**/test/**",
    "lib/**/tests/**",
    "lib/**/certora/**",
]

[lint]
lint_on_build = false
